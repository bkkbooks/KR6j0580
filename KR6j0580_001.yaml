body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯如是我聞一時佛在摩伽陀國法野大菩提道場初成正覺與諸菩薩摩訶薩衆八萬人俱復有八萬四千大梵天子亦在道場悉皆圍繞瞻仰世尊爾時會中有菩薩摩訶薩名觀自在從座而起偏袒右肩右膝著地合掌向佛而白佛言世尊有一切如來名號陀羅尼彼一切如來名號陀羅尼乃是莊嚴劫賢劫星宿劫中諸佛如來已説當説我今承佛威力亦為利益安樂諸衆生故樂欲宣説唯願世尊加哀覆護爾時世尊讚觀自在菩薩摩訶薩言善哉善哉觀自在汝能為利益一切衆生發大悲心如意宣説時觀自在菩薩蒙佛許已復白佛言世尊若人欲誦彼陀羅尼先當至誠誦諸佛如來名號所謂寶師子自在如來寶雲如來寶莊嚴藏如來師子大雲如來雲師子如來須彌如來師子吼如來師子利如來梵音如來善愛如來蓮華上如來燃燈如來蓮華生如來遜那囉如來持花如來持寶如來法生如來日光如來日照如來月光如來無量藏如來無量莊嚴藏如來無量光如來蓮華藏如來天妙音如來拘枳羅音如來如是等諸佛如來名號若人得聞為他宣説是人六十千劫不聞惡趣之名何況墮於阿鼻地獄時觀自在菩薩説是諸佛如來名號已即説陀羅尼曰怛𭔞切身下同他引一拶覩囉引尸引帝踰引惹仁左切下同那設多薩賀薩囉二合引尼二惹吒引婆引囉末酤吒引朗訖哩二合多引三馱引囉尼莎引賀引四薩哩嚩二合怛他引誐多母哩底二合多五馱引囉尼引莎引賀引六阿嚩路吉帝引説囉引野莎引賀引七薩哩嚩二合怛他引誐都引烏瑟膩二合沙引八馱引囉尼莎引賀引九薩哩嚩二合怛他引誐多婆引始多十達哩摩二合塞建二合馱十一馱引囉尼引莎引賀引十二薩哩嚩二合怛他引誐多婆引始多十三颯鉢多二合馱引囉尼莎引賀引十四鉢訥摩二合阿婆儞哥野莎引賀引十五阿瑟吒二合摩賀引跋野馱引囉尼莎引賀引十六稅引多嚩蘭拏二合引野莎引賀引十七薩哩嚩二合怛他引誐多那引摩馱引囉尼莎引賀引十八阿尸引帝鉢訥摩二合引設儞哥引野怛他引誐多馱引囉尼莎引賀引十九鉢訥摩二合賀悉多二合引野莎引賀引二十薩哩嚩二合滿怛囉二合馱引囉尼引莎引賀引二十一爾時觀自在菩薩説是陀羅尼已復白佛言世尊此一切如來名號陀羅尼若有善男子善女人受持讀誦思惟記念為他人説是人所有五無間業悉得消除命終之後生天為王壽八十四百千俱胝劫數然後得轉輪王位壽六十中劫過是劫已當得成佛名曰蓮華藏如來應供正等正覺爾時世尊説是經已八萬菩薩摩訶薩衆及八萬四千大梵天子聞佛所説皆大歡喜信受奉行
